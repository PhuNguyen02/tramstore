version: "3.8"

services:
  # ═══════════════════════════════════════════
  # 🐬 MySQL Database
  # ═══════════════════════════════════════════
  mysql:
    image: mysql:8.0
    container_name: tramstore-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tramstore
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════
  # 🔵 phpMyAdmin (Dev Tool)
  # ═══════════════════════════════════════════
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: tramstore-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local
