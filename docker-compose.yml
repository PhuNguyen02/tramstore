version: "3.8"

services:
  # ═══════════════════════════════════════════
  # 🟢 Backend (NestJS API + SQLite)
  # ═══════════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tramstore-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=4000
      - DATABASE_URL=file:/app/data/dev.db
    volumes:
      - ./backend/data:/app/data
    ports:
      - "4000:4000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ═══════════════════════════════════════════
  # 🟠 Frontend (Next.js Standalone)
  # ═══════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: tramstore-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - backend

# Note: Dữ liệu SQLite được lưu tại ./backend/data/dev.db trên máy host
