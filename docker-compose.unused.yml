version: "3.8"

services:
  # ═══════════════════════════════════════════
  # 🐬 MySQL Database
  # ═══════════════════════════════════════════
  mysql:
    image: mysql:8.0
    container_name: digimarket-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-digimarket_root_2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-digimarket}
      MYSQL_USER: ${MYSQL_USER:-digimarket_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-digimarket_pass_2024}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/prisma/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - digimarket-network

  # ═══════════════════════════════════════════
  # 🔵 phpMyAdmin (Dev Tool)
  # ═══════════════════════════════════════════
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: digimarket-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-digimarket_root_2024}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - digimarket-network

  # ═══════════════════════════════════════════
  # 🔴 Redis (Cache & Sessions)
  # ═══════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: digimarket-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-digimarket_redis_2024}
    volumes:
      - redis_data:/data
    networks:
      - digimarket-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  digimarket-network:
    driver: bridge
